<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Dívidas — Flávio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f8;
      min-height: 100vh;
      padding: 16px;
      color: #222;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #3b1fa8;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }

    /* CARDS TOPO */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid #e0e0e0;
    }

    .summary-card .label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .summary-card .value {
      font-size: 18px;
      font-weight: 700;
    }

    .red {
      color: #d32f2f;
    }

    .orange {
      color: #e65100;
    }

    .green {
      color: #2e7d32;
    }

    .purple {
      color: #3b1fa8;
    }

    /* BOTÃO ADICIONAR */
    .btn-add {
      background: #3b1fa8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      width: 100%;
    }

    .btn-add:hover {
      background: #2d1680;
    }

    /* FILTROS */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #ddd;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      color: #555;
    }

    .filter-btn.active {
      background: #3b1fa8;
      color: #fff;
      border-color: #3b1fa8;
    }

    /* LISTA DE DÍVIDAS */
    .divida-item {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.3s;
    }

    .divida-item.pago {
      opacity: 0.5;
      background: #f9f9f9;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.atrasado {
      background: #d32f2f;
    }

    .dot.vence-hoje {
      background: #ff6f00;
    }

    .dot.essa-semana {
      background: #f9a825;
    }

    .dot.proximo {
      background: #1565c0;
    }

    .dot.maio {
      background: #2e7d32;
    }

    .dot.pago {
      background: #bbb;
    }

    .divida-info {
      flex: 1;
      min-width: 0;
    }

    .divida-desc {
      font-size: 13px;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divida-item.pago .divida-desc {
      text-decoration: line-through;
      color: #aaa;
    }

    .divida-meta {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .divida-valor {
      font-size: 15px;
      font-weight: 700;
      color: #222;
      flex-shrink: 0;
    }

    .divida-item.pago .divida-valor {
      color: #bbb;
    }

    .btn-pagar {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1.5px solid #a5d6a7;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-pagar:hover {
      background: #c8e6c9;
    }

    .btn-pagar.desfazer {
      background: #f3e5f5;
      color: #7b1fa2;
      border-color: #ce93d8;
    }

    .btn-pagar.desfazer:hover {
      background: #e1bee7;
    }

    .btn-excluir {
      background: none;
      border: none;
      color: #ccc;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .btn-excluir:hover {
      color: #d32f2f;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #3b1fa8;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #3b1fa8;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn-salvar {
      flex: 1;
      background: #3b1fa8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-salvar:hover {
      background: #2d1680;
    }

    .btn-cancelar {
      flex: 1;
      background: #f5f5f5;
      color: #555;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cancelar:hover {
      background: #e0e0e0;
    }

    .grupo-titulo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin: 18px 0 8px;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 13px;
      padding: 30px 0;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
      margin-left: 6px;
    }

    .badge.atrasado {
      background: #ffebee;
      color: #c62828;
    }

    .badge.vence-hoje {
      background: #fff3e0;
      color: #e65100;
    }

    .badge.essa-semana {
      background: #fffde7;
      color: #f57f17;
    }

    .badge.pago {
      background: #e8f5e9;
      color: #2e7d32;
    }

    #error-banner {
      display: none;
      background: #ffebee;
      color: #b71c1c;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      border: 1px solid #ffcdd2;
    }

    #error-banner.show {
      display: block;
    }

    #sync-msg {
      font-size: 11px;
      color: #666;
      margin-top: -10px;
      margin-bottom: 12px;
      min-height: 16px;
    }

    .btn-add:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-add:disabled:hover {
      background: #3b1fa8;
    }

    .app-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 4px;
    }

    .app-top>div:first-child {
      min-width: 0;
    }

    .btn-sair {
      background: transparent;
      border: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .btn-sair:hover {
      color: #3b1fa8;
    }

    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 100%;
      border: 1px solid #e0e0e0;
    }

    .auth-title {
      font-size: 20px;
      font-weight: 700;
      color: #3b1fa8;
      margin-bottom: 8px;
    }

    .auth-hint {
      font-size: 13px;
      color: #666;
      margin-bottom: 18px;
      line-height: 1.45;
    }

    .auth-msg {
      font-size: 12px;
      color: #c62828;
      min-height: 18px;
      margin-bottom: 6px;
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .auth-actions .btn-salvar {
      flex: 1;
      min-width: 120px;
    }

    .btn-secondary {
      flex: 1;
      background: #f5f5f5;
      color: #555;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-width: 120px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }
  </style>
</head>

<body>

  <div id="error-banner" role="alert"></div>

  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">💰 Controle de Dívidas</h1>
      <p class="auth-hint">
        Use o <strong>mesmo e-mail e senha</strong> no celular e no computador. Os dados ficam no Supabase (nuvem).
      </p>
      <div class="form-group">
        <label for="auth-email">E-mail</label>
        <input type="email" id="auth-email" autocomplete="username" placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label for="auth-pass">Senha</label>
        <input type="password" id="auth-pass" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <p class="auth-msg" id="auth-msg" aria-live="polite"></p>
      <div class="auth-actions">
        <button type="button" class="btn-salvar" onclick="void authEntrar()">Entrar</button>
        <button type="button" class="btn-secondary" onclick="void authCriar()">Criar conta</button>
      </div>
    </div>
  </div>

  <div id="app-screen" hidden>
    <div class="app-top">
      <div>
        <h1>💰 Controle de Dívidas</h1>
        <p class="subtitle" id="data-hoje"></p>
      </div>
      <button type="button" class="btn-sair" onclick="void authSair()">Sair</button>
    </div>
    <p id="sync-msg"></p>

    <!-- RESUMO -->
    <div class="summary">
      <div class="summary-card">
        <div class="label">🔴 Atrasado</div>
        <div class="value red" id="total-atrasado">R$ 0</div>
      </div>
      <div class="summary-card">
        <div class="label">🟡 Esta semana</div>
        <div class="value orange" id="total-semana">R$ 0</div>
      </div>
      <div class="summary-card">
        <div class="label">🔵 Próximos</div>
        <div class="value green" id="total-proximo">R$ 0</div>
      </div>
      <div class="summary-card">
        <div class="label">✅ Já pago</div>
        <div class="value purple" id="total-pago">R$ 0</div>
      </div>
    </div>

    <button type="button" class="btn-add" id="btn-add" disabled onclick="abrirModal()">+ Adicionar dívida</button>

    <!-- FILTROS -->
    <div class="filters">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('atrasado', this)">Atrasados</button>
      <button class="filter-btn" onclick="filtrar('essa-semana', this)">Essa semana</button>
      <button class="filter-btn" onclick="filtrar('proximo', this)">Próximos</button>
      <button class="filter-btn" onclick="filtrar('pago', this)">Pagos</button>
    </div>

    <!-- LISTA -->
    <div id="lista-dividas"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h2>Nova dívida</h2>
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="f-desc" placeholder="Ex: Luz casa abril" />
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="f-cat">
            <option value="Casa">🏠 Casa</option>
            <option value="Lanchonete">🍽️ Lanchonete</option>
            <option value="Carro">🚗 Carro</option>
            <option value="Cartão">💳 Cartão</option>
            <option value="Água">💧 Água</option>
            <option value="Telefone">📱 Telefone</option>
            <option value="Outro">📋 Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0" />
        </div>
        <div class="form-group">
          <label>Data de vencimento (opcional)</label>
          <input type="date" id="f-data" />
        </div>
        <div class="modal-btns">
          <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
          <button class="btn-salvar" onclick="salvarDivida()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!--
  Supabase: rode supabase/migrations/001_dividas.sql, preencha URL + anon key,
  e em Authentication > Providers habilite E-mail (senha). Para uso só seu,
  em Authentication > Providers > Email pode desativar "Confirm email".
-->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script>
    /** Troque pelos dados do projeto: Settings > API */
    const SUPABASE_URL = "https://jyscinzdgxiwzjgdstvx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5c2NpbnpkZ3hpd3pqZ2RzdHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTg5NDcsImV4cCI6MjA5MjM3NDk0N30.gqbM5kVTWRrqstiBKOTVa426__u8_twSanqCrdTM6BQ";

    /** Cliente Supabase (evita confundir com window.supabase = SDK) */
    let sb = null;
    let dividas = [];
    let filtroAtivo = "todos";

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function showError(msg) {
      const el = document.getElementById("error-banner");
      el.textContent = msg;
      el.classList.add("show");
    }
    function clearError() {
      const el = document.getElementById("error-banner");
      el.textContent = "";
      el.classList.remove("show");
    }
    function setSync(msg) {
      document.getElementById("sync-msg").textContent = msg || "";
    }

    function todayMidnight() {
      const t = new Date();
      return new Date(t.getFullYear(), t.getMonth(), t.getDate());
    }

    function parseLocalDate(iso) {
      if (!iso || !String(iso).trim()) return null;
      const parts = String(iso).split("-").map(Number);
      if (parts.length < 3 || parts.some(Number.isNaN)) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function startOfWeekMonday(ref) {
      const d = new Date(ref.getFullYear(), ref.getMonth(), ref.getDate());
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function endOfWeekMonday(ref) {
      const s = startOfWeekMonday(ref);
      const e = new Date(s);
      e.setDate(s.getDate() + 6);
      e.setHours(23, 59, 59, 999);
      return e;
    }

    /** atrasado | vence-hoje | essa-semana | proximo | pago */
    function computeStatus(d) {
      if (d.pago) return "pago";
      const v = parseLocalDate(d.venc);
      const today = todayMidnight();
      if (!v) return "proximo";
      const vd = new Date(v.getFullYear(), v.getMonth(), v.getDate());
      if (vd < today) return "atrasado";
      if (vd.getTime() === today.getTime()) return "vence-hoje";
      const end = endOfWeekMonday(today);
      if (vd >= today && vd <= end) return "essa-semana";
      return "proximo";
    }

    function mapRow(r) {
      const v = r.valor;
      const num = typeof v === "string" ? parseFloat(v) : Number(v);
      return {
        id: r.id,
        desc: r.descricao,
        cat: r.categoria,
        valor: Number.isFinite(num) ? num : 0,
        venc: r.vencimento ? String(r.vencimento).slice(0, 10) : "",
        pago: !!r.pago,
      };
    }

    function fmt(v) {
      return "R$ " + v.toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function fmtData(str) {
      if (!str) return "Sem data";
      const [y, m, d] = str.split("-");
      return `${d}/${m}/${y}`;
    }

    function parseValorInput(raw) {
      const s = String(raw || "").trim().replace(/\s/g, "").replace(",", ".");
      return parseFloat(s);
    }

    function cmpVenc(a, b) {
      if (!a.venc && !b.venc) return 0;
      if (!a.venc) return 1;
      if (!b.venc) return -1;
      return a.venc.localeCompare(b.venc);
    }

    function render() {
      let totAtrasado = 0, totSemana = 0, totProximo = 0, totPago = 0;
      dividas.forEach((d) => {
        if (d.pago) {
          totPago += d.valor;
          return;
        }
        const s = computeStatus(d);
        if (s === "atrasado") totAtrasado += d.valor;
        else if (s === "essa-semana" || s === "vence-hoje") totSemana += d.valor;
        else if (s === "proximo") totProximo += d.valor;
      });
      document.getElementById("total-atrasado").textContent = fmt(totAtrasado);
      document.getElementById("total-semana").textContent = fmt(totSemana);
      document.getElementById("total-proximo").textContent = fmt(totProximo);
      document.getElementById("total-pago").textContent = fmt(totPago);

      let lista =
        filtroAtivo === "todos"
          ? dividas.slice()
          : filtroAtivo === "pago"
            ? dividas.filter((d) => d.pago)
            : dividas.filter((d) => {
              if (d.pago) return false;
              const s = computeStatus(d);
              if (filtroAtivo === "essa-semana")
                return s === "essa-semana" || s === "vence-hoje";
              return s === filtroAtivo;
            });

      lista.sort((a, b) => {
        if (a.pago !== b.pago) return a.pago ? 1 : -1;
        return cmpVenc(a, b);
      });

      const el = document.getElementById("lista-dividas");
      if (lista.length === 0) {
        el.innerHTML = '<p class="empty">Nenhuma dívida encontrada 🎉</p>';
        return;
      }

      const grupos = {};
      lista.forEach((d) => {
        if (!grupos[d.cat]) grupos[d.cat] = [];
        grupos[d.cat].push(d);
      });

      let html = "";
      Object.keys(grupos)
        .sort()
        .forEach((cat) => {
          grupos[cat].sort(cmpVenc);
          const totalGrupo = grupos[cat].reduce((s, d) => s + d.valor, 0);
          html += `<div class="grupo-titulo">${escapeHtml(cat)} <span style="font-weight:400;color:#bbb;">— ${fmt(totalGrupo)}</span></div>`;
          grupos[cat].forEach((d) => {
            const st = computeStatus(d);
            const statusClass = d.pago ? "pago" : st;
            let badge = "";
            if (!d.pago) {
              if (st === "atrasado")
                badge = `<span class="badge atrasado">ATRASADO</span>`;
              else if (st === "vence-hoje")
                badge = `<span class="badge vence-hoje">HOJE</span>`;
              else if (st === "essa-semana")
                badge = `<span class="badge essa-semana">ESTA SEMANA</span>`;
            } else {
              badge = `<span class="badge pago">PAGO ✓</span>`;
            }
            const btnTxt = d.pago ? "Desfazer" : "Marcar pago";
            const btnClass = d.pago ? "btn-pagar desfazer" : "btn-pagar";
            html += `
        <div class="divida-item ${d.pago ? "pago" : ""}" id="item-${escapeHtml(d.id)}">
          <div class="dot ${statusClass}"></div>
          <div class="divida-info">
            <div class="divida-desc">${escapeHtml(d.desc)}${badge}</div>
            <div class="divida-meta">Vence: ${fmtData(d.venc)} · ${escapeHtml(d.cat)}</div>
          </div>
          <div class="divida-valor">${fmt(d.valor)}</div>
          <button type="button" class="${btnClass}" onclick="void togglePago('${d.id}')">${btnTxt}</button>
          <button type="button" class="btn-excluir" onclick="void excluir('${d.id}')" title="Excluir">×</button>
        </div>`;
          });
        });
      el.innerHTML = html;
    }

    async function loadDividas() {
      if (!sb) return;
      clearError();
      setSync("Sincronizando…");
      const { data, error } = await sb
        .from("dividas")
        .select("*")
        .order("vencimento", { ascending: true, nullsFirst: false });
      if (error) {
        showError(error.message);
        dividas = [];
        render();
        setSync("");
        return;
      }
      dividas = (data || []).map(mapRow);
      render();
      setSync("Dados do Supabase");
    }

    async function togglePago(id) {
      const d = dividas.find((x) => x.id === id);
      if (!d || !sb) return;
      const next = !d.pago;
      const { error } = await sb.from("dividas").update({ pago: next }).eq("id", id);
      if (error) {
        alert(error.message);
        return;
      }
      d.pago = next;
      render();
    }

    async function excluir(id) {
      if (!confirm("Remover essa dívida?") || !sb) return;
      const { error } = await sb.from("dividas").delete().eq("id", id);
      if (error) {
        alert(error.message);
        return;
      }
      dividas = dividas.filter((x) => x.id !== id);
      render();
    }

    function filtrar(tipo, btn) {
      filtroAtivo = tipo;
      document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function abrirModal() {
      if (!sb) return;
      document.getElementById("f-desc").value = "";
      document.getElementById("f-valor").value = "";
      document.getElementById("f-data").value = "";
      document.getElementById("f-cat").selectedIndex = 0;
      document.getElementById("modal").classList.add("open");
    }

    function fecharModal() {
      document.getElementById("modal").classList.remove("open");
    }

    async function salvarDivida() {
      if (!sb) return;
      const desc = document.getElementById("f-desc").value.trim();
      const cat = document.getElementById("f-cat").value;
      const valor = parseValorInput(document.getElementById("f-valor").value);
      const venc = document.getElementById("f-data").value.trim();

      if (!desc) {
        alert("Coloca uma descrição!");
        return;
      }
      if (!Number.isFinite(valor) || valor <= 0) {
        alert("Coloca um valor válido!");
        return;
      }

      const row = {
        descricao: desc,
        categoria: cat,
        valor,
        vencimento: venc || null,
        pago: false,
      };
      const { data, error } = await sb.from("dividas").insert(row).select().single();
      if (error) {
        alert(error.message);
        return;
      }
      dividas.push(mapRow(data));
      fecharModal();
      render();
    }

    document.getElementById("modal").addEventListener("click", function (e) {
      if (e.target === this) fecharModal();
    });

    function atualizarDataHoje() {
      const hoje = new Date();
      const opts = { weekday: "long", day: "2-digit", month: "long", year: "numeric" };
      const el = document.getElementById("data-hoje");
      if (el) el.textContent = hoje.toLocaleDateString("pt-BR", opts);
    }

    function setAuthMsg(msg) {
      const el = document.getElementById("auth-msg");
      if (el) el.textContent = msg || "";
    }

    function showAuthUI() {
      document.getElementById("auth-screen").hidden = false;
      document.getElementById("app-screen").hidden = true;
    }

    function showAppUI() {
      document.getElementById("auth-screen").hidden = true;
      document.getElementById("app-screen").hidden = false;
    }

    async function authEntrar() {
      setAuthMsg("");
      if (!sb) return;
      const email = document.getElementById("auth-email").value.trim();
      const password = document.getElementById("auth-pass").value;
      if (!email || !password) {
        setAuthMsg("Preencha e-mail e senha.");
        return;
      }
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) setAuthMsg(error.message);
    }

    async function authCriar() {
      setAuthMsg("");
      if (!sb) return;
      const email = document.getElementById("auth-email").value.trim();
      const password = document.getElementById("auth-pass").value;
      if (!email || !password) {
        setAuthMsg("Preencha e-mail e senha.");
        return;
      }
      if (password.length < 6) {
        setAuthMsg("A senha deve ter pelo menos 6 caracteres.");
        return;
      }
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) {
        setAuthMsg(error.message);
        return;
      }
      if (!data.session) {
        setAuthMsg(
          "Conta criada. Se aparecer pedido de confirmação, verifique o e-mail ou desative “Confirm email” em Authentication > Providers > Email no Supabase."
        );
      }
    }

    async function authSair() {
      if (!sb) return;
      fecharModal();
      await sb.auth.signOut();
    }

    async function iniciar() {
      atualizarDataHoje();
      const btn = document.getElementById("btn-add");

      if (
        !SUPABASE_URL ||
        !SUPABASE_ANON_KEY ||
        SUPABASE_URL.includes("SEU-PROJETO") ||
        SUPABASE_ANON_KEY.includes("SUA-CHAVE")
      ) {
        showError(
          "Configure SUPABASE_URL e SUPABASE_ANON_KEY no final deste arquivo (Settings > API no Supabase)."
        );
        btn.disabled = true;
        render();
        return;
      }

      if (typeof window.supabase === "undefined") {
        showError("Não foi possível carregar o SDK do Supabase (CDN). Verifique a conexão.");
        btn.disabled = true;
        render();
        return;
      }

      const lib = window.supabase;
      const createClient = lib && lib.createClient ? lib.createClient : null;
      if (!createClient) {
        showError("SDK do Supabase inválido: createClient não encontrado.");
        btn.disabled = true;
        render();
        return;
      }

      sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      clearError();
      setSync("");

      sb.auth.onAuthStateChange(async (_event, session) => {
        atualizarDataHoje();
        if (!session) {
          showAuthUI();
          dividas = [];
          render();
          btn.disabled = true;
          setSync("");
          return;
        }
        showAppUI();
        btn.disabled = false;
        await loadDividas();
      });

      const passEl = document.getElementById("auth-pass");
      if (passEl) {
        passEl.addEventListener("keydown", function (e) {
          if (e.key === "Enter") void authEntrar();
        });
      }
    }

    iniciar();
  </script>
</body>

</html>
